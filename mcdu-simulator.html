<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A320 MCDU Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1f2e;
            color: #e0e6ed;
            padding: 20px;
        }

        .mcdu-unit {
            max-width: 600px;
            margin: 0 auto;
            background: #2d3744;
            border: 4px solid #3d4f64;
            border-radius: 8px;
            padding: 20px;
        }

        .mcdu-screen {
            background: #0a0e14;
            border: 3px solid #1a1f2e;
            padding: 15px;
            font-family: 'Courier New', monospace;
            min-height: 400px;
            border-radius: 4px;
            font-size: 14px;
        }

        .mcdu-title {
            color: #fff;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1a1f2e;
        }

        .mcdu-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 8px 0;
        }

        .mcdu-label {
            color: #7ec699;
            font-size: 11px;
        }

        .mcdu-value {
            color: #f5a623;
            font-size: 13px;
        }

        .mcdu-value.white {
            color: #fff;
        }

        .mcdu-value.cyan {
            color: #4a90e2;
        }

        .mcdu-value.green {
            color: #7ec699;
        }

        .mcdu-value.magenta {
            color: #c678dd;
        }

        .mcdu-dashes {
            color: #4a90e2;
        }

        .mcdu-box {
            color: #f5a623;
            border: 1px solid #f5a623;
            padding: 2px 4px;
            display: inline-block;
        }

        .mcdu-scratchpad {
            background: #000;
            border: 2px solid #4a90e2;
            padding: 10px;
            margin-top: 15px;
            min-height: 30px;
            color: #f5a623;
            font-size: 16px;
        }

        .mcdu-lsk-labels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }

        .lsk-left {
            text-align: left;
            color: #7ec699;
            font-size: 11px;
        }

        .lsk-right {
            text-align: right;
            color: #7ec699;
            font-size: 11px;
        }

        .mcdu-keyboard {
            margin-top: 20px;
        }

        .key-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 5px 0;
        }

        .key {
            background: #3d4f64;
            border: 2px solid #4a5f7a;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #e0e6ed;
            min-width: 45px;
            text-align: center;
            transition: all 0.1s;
        }

        .key:active {
            background: #4a5f7a;
            transform: translateY(2px);
        }

        .key.special {
            background: #4a90e2;
            color: #fff;
        }

        .key.lsk {
            background: #2d4a64;
            border-color: #4a90e2;
        }

        .key.function {
            background: #243447;
            font-size: 11px;
            padding: 10px 8px;
        }

        .page-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        .instruction {
            background: #1e3a4a;
            border-left: 4px solid #4a90e2;
            padding: 15px;
            margin: 15px 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="mcdu-unit">
        <h1 style="text-align: center; color: #4a90e2; margin-bottom: 20px;">A320 MCDU Detailed Practice</h1>
        
        <div class="instruction" id="instruction">
            <strong>Instructions:</strong> This is a detailed MCDU practice mode. Use the keyboard below to type, LSK buttons to interact with the screen, and function keys to navigate pages.
        </div>

        <div class="page-buttons">
            <button class="key function" onclick="showPage('data')">DATA</button>
            <button class="key function" onclick="showPage('init')">INIT</button>
            <button class="key function" onclick="showPage('fplan')">F-PLN</button>
            <button class="key function" onclick="showPage('perf')">PERF</button>
            <button class="key function" onclick="showPage('radnav')">RAD NAV</button>
        </div>

        <div class="mcdu-screen" id="screen">
            <!-- Content populated by JavaScript -->
        </div>

        <div class="mcdu-scratchpad" id="scratchpad"></div>

        <!-- LSK Buttons (Line Select Keys) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;">
            <div>
                <button class="key lsk" onclick="pressLSK('L1')" style="width: 100%; margin: 3px 0;">L1</button>
                <button class="key lsk" onclick="pressLSK('L2')" style="width: 100%; margin: 3px 0;">L2</button>
                <button class="key lsk" onclick="pressLSK('L3')" style="width: 100%; margin: 3px 0;">L3</button>
                <button class="key lsk" onclick="pressLSK('L4')" style="width: 100%; margin: 3px 0;">L4</button>
                <button class="key lsk" onclick="pressLSK('L5')" style="width: 100%; margin: 3px 0;">L5</button>
                <button class="key lsk" onclick="pressLSK('L6')" style="width: 100%; margin: 3px 0;">L6</button>
            </div>
            <div>
                <button class="key lsk" onclick="pressLSK('R1')" style="width: 100%; margin: 3px 0;">R1</button>
                <button class="key lsk" onclick="pressLSK('R2')" style="width: 100%; margin: 3px 0;">R2</button>
                <button class="key lsk" onclick="pressLSK('R3')" style="width: 100%; margin: 3px 0;">R3</button>
                <button class="key lsk" onclick="pressLSK('R4')" style="width: 100%; margin: 3px 0;">R4</button>
                <button class="key lsk" onclick="pressLSK('R5')" style="width: 100%; margin: 3px 0;">R5</button>
                <button class="key lsk" onclick="pressLSK('R6')" style="width: 100%; margin: 3px 0;">R6</button>
            </div>
        </div>

        <!-- Keyboard -->
        <div class="mcdu-keyboard">
            <div class="key-row">
                <button class="key" onclick="typeChar('A')">A</button>
                <button class="key" onclick="typeChar('B')">B</button>
                <button class="key" onclick="typeChar('C')">C</button>
                <button class="key" onclick="typeChar('D')">D</button>
                <button class="key" onclick="typeChar('E')">E</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('F')">F</button>
                <button class="key" onclick="typeChar('G')">G</button>
                <button class="key" onclick="typeChar('H')">H</button>
                <button class="key" onclick="typeChar('I')">I</button>
                <button class="key" onclick="typeChar('J')">J</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('K')">K</button>
                <button class="key" onclick="typeChar('L')">L</button>
                <button class="key" onclick="typeChar('M')">M</button>
                <button class="key" onclick="typeChar('N')">N</button>
                <button class="key" onclick="typeChar('O')">O</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('P')">P</button>
                <button class="key" onclick="typeChar('Q')">Q</button>
                <button class="key" onclick="typeChar('R')">R</button>
                <button class="key" onclick="typeChar('S')">S</button>
                <button class="key" onclick="typeChar('T')">T</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('U')">U</button>
                <button class="key" onclick="typeChar('V')">V</button>
                <button class="key" onclick="typeChar('W')">W</button>
                <button class="key" onclick="typeChar('X')">X</button>
                <button class="key" onclick="typeChar('Y')">Y</button>
                <button class="key" onclick="typeChar('Z')">Z</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('1')">1</button>
                <button class="key" onclick="typeChar('2')">2</button>
                <button class="key" onclick="typeChar('3')">3</button>
                <button class="key" onclick="typeChar('4')">4</button>
                <button class="key" onclick="typeChar('5')">5</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('6')">6</button>
                <button class="key" onclick="typeChar('7')">7</button>
                <button class="key" onclick="typeChar('8')">8</button>
                <button class="key" onclick="typeChar('9')">9</button>
                <button class="key" onclick="typeChar('0')">0</button>
            </div>
            <div class="key-row">
                <button class="key" onclick="typeChar('.')">.</button>
                <button class="key" onclick="typeChar('/')">/</button>
                <button class="key" onclick="typeChar(' ')">SP</button>
                <button class="key special" onclick="clearScratchpad()">CLR</button>
            </div>
        </div>
    </div>

    <script src="mcdu-simulator.js"></script>
</body>
</html>
